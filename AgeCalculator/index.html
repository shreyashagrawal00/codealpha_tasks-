<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Age Calculator</title>
    <meta name="description" content="Calculate your exact age in years, months, and days with our premium age calculator.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator-wrapper">
        <div class="glass-panel">
            <div class="header">
                <h1>Age Calculator</h1>
                <p>Discover exactly how long you've been exploring the world.</p>
            </div>
            
            <form id="age-form" class="input-section">
                <div class="input-group">
                    <label for="day">Day</label>
                    <input type="number" id="day" name="day" placeholder="DD" min="1" max="31" required>
                    <small class="error-msg" id="error-day"></small>
                </div>
                <div class="input-group">
                    <label for="month">Month</label>
                    <input type="number" id="month" name="month" placeholder="MM" min="1" max="12" required>
                    <small class="error-msg" id="error-month"></small>
                </div>
                <div class="input-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" name="year" placeholder="YYYY" required>
                    <small class="error-msg" id="error-year"></small>
                </div>
                
                <button type="submit" id="calculate-btn">
                    <span>Calculate</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>

            <div class="divider"></div>

            <div class="results-section">
                <div class="result-item">
                    <span class="value" id="res-years">--</span>
                    <span class="label">Years</span>
                </div>
                <div class="result-item">
                    <span class="value" id="res-months">--</span>
                    <span class="label">Months</span>
                </div>
                <div class="result-item">
                    <span class="value" id="res-days">--</span>
                    <span class="label">Days</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="extra-stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Next Birthday</span>
                    <span class="stat-value" id="res-next-bday">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Days Until Birthday</span>
                    <span class="stat-value" id="res-days-until">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Days Lived</span>
                    <span class="stat-value" id="res-total-days">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Heartbeats (Approx)</span>
                    <span class="stat-value" id="res-heartbeats">--</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
